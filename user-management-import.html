    <!-- ===== MODAL GERENCIAR USUÁRIOS (ADMIN) ===== -->
    <div id="modal-gerenciar-usuarios" class="modal" style="display:none;">
        <div class="modal-content" style="max-width:800px;">
            <div class="modal-header">
                <h3>👥 Gerenciar Usuários</h3>
                <button class="modal-close" onclick="fecharModalGerenciarUsuarios()">×</button>
            </div>
            <div class="modal-body">
                <!-- Formulário: Novo Usuário -->
                <div class="form-row" style="background:var(--navy);padding:15px;border-radius:8px;margin-bottom:20px;">
                    <h4 style="margin-bottom:12px;">➕ Criar Novo Usuário</h4>
                    <div class="form-group">
                        <label>E-mail</label>
                        <input type="email" id="novo-user-email" class="form-control" placeholder="usuario@email.com">
                    </div>
                    <div class="form-group">
                        <label>Senha</label>
                        <input type="password" id="novo-user-senha" class="form-control" placeholder="••••••••">
                    </div>
                    <div class="form-group">
                        <label>Role</label>
                        <select id="novo-user-role" class="form-control">
                            <option value="viewer">Viewer (apenas leitura)</option>
                            <option value="admin">Admin (acesso total)</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="criarNovoUsuario()">Criar Usuário</button>
                </div>

                <!-- Lista de Usuários -->
                <h4 style="margin-bottom:12px;">📋 Usuários Cadastrados</h4>
                <div id="lista-usuarios" class="users-list">
                    <!-- Preenchido via JS -->
                </div>

                <div style="margin-top:20px;text-align:right;">
                    <button class="btn btn-outline" onclick="fecharModalGerenciarUsuarios()">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="auth.js"></script>
    <script src="user-management.js"></script>
    <script src="app.js"></script>
</body>
</html>
